name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            codex-agent-keys/package-lock.json

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Install locked Agent Keys dependencies
        run: npm ci --ignore-scripts --prefix codex-agent-keys

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Audit Agent Keys production dependencies
        run: npm audit --prefix codex-agent-keys --omit=dev --audit-level=high

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck Agent Keys
        run: npm run typecheck --prefix codex-agent-keys

      - name: Test
        run: npm test

      - name: Test Agent Keys
        run: npm test --prefix codex-agent-keys

      - name: Build
        run: npm run build

      - name: Validate Stream Deck package
        run: npm run validate:ci

      - name: Check Python helpers
        run: python3 -m py_compile com.codexstreamdeck.control.sdPlugin/helpers/codex_streamdeck_notify.py com.codexstreamdeck.control.sdPlugin/helpers/codex_streamdeck_notify_chain.py

      - name: Check release privacy
        run: npm run privacy
