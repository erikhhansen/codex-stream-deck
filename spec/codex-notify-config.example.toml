# Add this to the user-level Codex config, normally ~/.codex/config.toml.
# Use an absolute path. Do not put this in a repository-controlled project config.
#
# IMPORTANT: `notify` is a TOML root key. It must appear BEFORE any table
# section such as [tui] or [mcp_servers.*]. Appending it to the end of an
# existing config.toml will silently break parsing.
#
# Codex invokes this command for `agent-turn-complete` and
# `approval-requested` events, passing one JSON payload as argv[1].

# macOS / Linux-style Python launcher:
notify = ["python3", "/absolute/path/to/codex_streamdeck_notify.py"]

# Windows alternative (use this instead of the line above):
# notify = ["py", "-3", "C:\\Users\\NAME\\AppData\\Local\\CodexStreamDeck\\codex_streamdeck_notify.py"]
